name: Daily Morning Briefing

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Morning Briefing Agent
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          REPORT_BASE_URL: https://tingtingxiao0706.github.io/morning-briefing
        run: python main.py

      - name: Deploy report to GitHub Pages
        if: success()
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 保留最近 30 天的报告
          cp *.html index.html 2>/dev/null || true
          git add -A
          git commit -m "deploy briefing $(date +%Y-%m-%d)"
          git push --force https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:gh-pages
